<div class="mopedgarage-lightbox" id="mopedgarage-lightbox" hidden aria-hidden="true">
    <div class="mopedgarage-lightbox__backdrop js-mopedgarage-lightbox-close"></div>
    <div class="mopedgarage-lightbox__dialog" role="dialog" aria-modal="true" aria-label="{L_MOPEDGARAGE_OPEN_IMAGE}">
        <button type="button" class="mopedgarage-lightbox__close js-mopedgarage-lightbox-close" aria-label="{L_CLOSE_WINDOW}">&times;</button>
        <div class="mopedgarage-lightbox__content">
            <img src="" alt="" class="mopedgarage-lightbox__image" id="mopedgarage-lightbox-image">
            <div class="mopedgarage-lightbox__caption" id="mopedgarage-lightbox-caption"></div>
        </div>
    </div>
</div>
